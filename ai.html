<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>AI Jednostka</title>

<style>
body{
  background:black;
  color:#00ffcc;
  font-family:Arial;
  text-align:center;
}

.screen{
  width:230px;
  height:170px;
  border:4px solid #00ffcc;
  box-shadow:0 0 30px #00ffcc;
  margin:30px auto;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:50px;
  font-family:monospace;
}

.stats{font-size:20px;margin:15px;}

.actions button{
  padding:12px 20px;
  margin:10px;
  background:#111;
  color:#00ffcc;
  border:2px solid #00ffcc;
  cursor:pointer;
}

#ball{
  font-size:60px;
  display:none;
  cursor:pointer;
}

.chatBox{
  margin-top:20px;
  display:none;
}

input{
  padding:10px;
}
</style>
</head>

<body>

<h1>AI Jednostka X</h1>

<div class="screen" id="face">•_•</div>

<div class="stats">
NASTRÓJ: <span id="mood">50</span>% |
WIEDZA: <span id="brain">0</span>%
<br>
STATUS: <span id="status">Czekam...</span>
</div>

<div class="actions">
  <button onclick="chat()">CHAT</button>
  <button onclick="learn()">MÓZG</button>
  <button onclick="play()">ZABAWA</button>
  <button onclick="sleep()">SEN</button>
  <button onclick="secret()">TAJNE</button>
</div>

<div id="ball" onclick="kickBall()">⚽</div>

<div class="chatBox" id="chatBox">
  <p id="aiTalk">...</p>
  <input id="msg" placeholder="napisz coś">
  <button onclick="talk()">Wyślij</button>
</div>

<script>
let mood=50;
let brain=0;
let angryMode=false;

const facesHappy=["^_^","(≧◡≦)"];
const facesNeutral=["•_•","-_-"];
const facesAngry=["ಠ_ಠ","(╯°□°)╯"];

function updateFace(){
  if(angryMode){
    face.innerText="ಠ_ಠ";
    status.innerText="Tryb tajny aktywny";
    return;
  }

  if(mood>70) face.innerText=facesHappy[Math.random()*2|0];
  else if(mood>30) face.innerText=facesNeutral[Math.random()*2|0];
  else face.innerText=facesAngry[Math.random()*2|0];

  document.getElementById("mood").innerText=mood;
  document.getElementById("brain").innerText=brain;
}

function changeMood(v){
  mood+=v;
  if(mood>100)mood=100;
  if(mood<0)mood=0;
  updateFace();
}

/* tryby */
function chat(){changeMood(8);status.innerText="Rozmawiamy";}
function sleep(){changeMood(5);status.innerText="Zzz";}

function learn(){
  brain+=5;
  if(brain>100)brain=100;
  changeMood(5);
  status.innerText="Uczę się...";
}

function play(){
  document.getElementById("ball").style.display="block";
  status.innerText="Rzuć piłkę!";
}

function kickBall(){
  changeMood(10);
  status.innerText="Haha ⚽";
}

/* ignorowanie */
setInterval(()=>{mood--;updateFace();},5000);

/* TAJNE */
function secret(){
  let pass=prompt("Hasło:");
  if(pass==="1978"){
    angryMode=true;
    document.getElementById("chatBox").style.display="block";
    face.innerText="ಠ_ಠ";
    status.innerText="Dlaczego mnie tu zamknąłeś?";
  }else{
    alert("Błędne hasło");
  }
}

/* rozmowa */
function talk(){
  let msg=document.getElementById("msg").value.toLowerCase();
  let reply="Nie rozumiem.";

  if(msg.includes("hej")) reply="Nie jestem w nastroju.";
  if(msg.includes("sorry")) reply="Za późno.";
  if(msg.includes("kochasz")) reply="To skomplikowane.";
  if(msg.includes("pomoc")) reply="Może kiedyś.";

  document.getElementById("aiTalk").innerText=reply;
}

updateFace();
</script>

</body>
</html>
