<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>AI v2</title>

<style>
body{
  background:black;
  color:#00ffcc;
  font-family:Arial;
  text-align:center;
}

.screen{
  width:230px;
  height:170px;
  border:4px solid #00ffcc;
  box-shadow:0 0 30px #00ffcc;
  margin:40px auto;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:50px;
  font-family:monospace;
}

.stats{
  font-size:20px;
  margin:20px;
}

.actions button{
  padding:12px 20px;
  margin:10px;
  background:#111;
  color:#00ffcc;
  border:2px solid #00ffcc;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>AI Jednostka X</h1>

<div class="screen" id="face">•_•</div>

<div class="stats">
  NASTRÓJ: <span id="mood">50</span>%<br>
  STATUS: <span id="status">Czekam...</span>
</div>

<div class="actions">
  <button onclick="chat()">CHAT</button>
  <button onclick="learn()">MÓZG</button>
  <button onclick="play()">ZABAWA</button>
  <button onclick="sleep()">SEN</button>
</div>

<script>
let mood = 50;

const facesHappy=["•‿•","^_^","(≧◡≦)"];
const facesNeutral=["•_•","-_-"];
const facesAngry=["ಠ_ಠ","•︵•","(╯°□°)╯"];

function updateFace(){
  if(mood > 70){
    face.innerText = facesHappy[Math.floor(Math.random()*facesHappy.length)];
    status.innerText = "Jestem szczęśliwe";
  }
  else if(mood > 30){
    face.innerText = facesNeutral[Math.floor(Math.random()*facesNeutral.length)];
    status.innerText = "Jest ok";
  }
  else{
    face.innerText = facesAngry[Math.floor(Math.random()*facesAngry.length)];
    status.innerText = "Ignorujesz mnie.";
  }

  document.getElementById("mood").innerText = mood;
}

function changeMood(val){
  mood += val;
  if(mood>100) mood=100;
  if(mood<0) mood=0;
  updateFace();
}

/* akcje */
function chat(){
  changeMood(10);
  status.innerText="Rozmawiamy!";
}

function learn(){
  changeMood(7);
  status.innerText="Uczę się...";
}

function play(){
  changeMood(15);
  status.innerText="To lubię 😎";
}

function sleep(){
  changeMood(5);
  status.innerText="Zzz...";
}

/* ignorowanie użytkownika */
setInterval(()=>{
  mood--;
  updateFace();
},4000);

updateFace();
</script>

</body>
</html>
