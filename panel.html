<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Panel ZPC</title>

<style>
body{
  background:#0b0f1a;
  color:#00ffcc;
  font-family:Arial;
  text-align:center;
}

.top{
  position:absolute;
  top:10px;
  right:20px;
  font-size:14px;
}

.tabs button{
  background:#111;
  color:#00ffcc;
  border:2px solid #00ffcc;
  padding:10px 20px;
  margin:10px;
  cursor:pointer;
}

.tab{
  display:none;
  margin-top:20px;
}
</style>
</head>

<body>

<div class="top">
Zalogowano jako: <span id="who"></span>
</div>

<h1>Fundacja ZPC</h1>

<div class="tabs">
  <button onclick="openTab('scp')">SCP</button>
  <button onclick="openTab('info')">Informacje</button>
  <button onclick="openAI()">Stare AI</button>
</div>

<div id="scp" class="tab">
  <h2>Baza SCP</h2>
  <p>SCP-173 – posąg zabijający gdy nie patrzysz.</p>
  <p>SCP-096 – płaczący typ co nie lubi zdjęć.</p>
  <p>SCP-682 – jaszczurka której nic nie zabija.</p>
</div>

<div id="info" class="tab">
  <h2>Informacje</h2>
  <p>Poziom dostępu: TAJNE</p>
  <p>Status placówki: stabilny</p>
  <p>MTF: gotowe do akcji</p>
</div>

<script>
let currentUser = localStorage.getItem("loggedUser");
document.getElementById("who").textContent = currentUser;

function openTab(tab){
  document.querySelectorAll(".tab").forEach(t=>t.style.display="none");
  document.getElementById(tab).style.display="block";
}

function openAI(){
  window.location.href = "ai.html";
}

openTab('scp');
</script>

</body>
</html>
