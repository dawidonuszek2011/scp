<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fundacja SSI</title>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Fundacja SSI</h1>
    <p>Zabezpieczamy. Badamy. Chronimy.</p>

    <p id="status"></p>
</header>

<main>
    <h2>Witamy w bazie danych SSI</h2>

    <p>
        Dostęp do dokumentacji wymaga odpowiedniego poziomu autoryzacji.
    </p>
</main>

<!-- SIDEBAR -->

<div class="sidebar">

    <a href="index.html" class="menu-btn">
        <i class="fas fa-house"></i>
        <span>Strona Główna</span>
    </a>

    <a href="#" class="menu-btn" onclick="goAnomalies(event)">
        <i class="fas fa-biohazard"></i>
        <span>Anomalie</span>
    </a>

    <a href="o-fundacji.html" class="menu-btn">
        <i class="fas fa-building"></i>
        <span>Fundacja</span>
    </a>

    <a href="personel.html" class="menu-btn">
        <i class="fas fa-user-secret"></i>
        <span>Personel</span>
    </a>

    <a href="incydenty.html" class="menu-btn">
        <i class="fas fa-triangle-exclamation"></i>
        <span>Incydenty</span>
    </a>

</div>

<script>
function getAuth() {
    return JSON.parse(sessionStorage.getItem("auth"));
}

// 🔐 status użytkownika
const auth = getAuth();

document.getElementById("status").innerText =
    auth
        ? `Zalogowano: ${auth.username} | ${auth.role} | LVL ${auth.level}`
        : "NIEZALOGOWANY — dostęp ograniczony";

// 🚨 wejście do anomalie
function goAnomalies(e) {
    e.preventDefault();

    const auth = getAuth();

    if (!auth) {
        window.location.href = "login.html?redirect=anomalie.html";
        return;
    }

    if (auth.role !== "o5" && auth.role !== "MTF" && auth.role !== "Secure Guard") {
        alert("Brak uprawnień. SSI odmawia dostępu.");
        return;
    }

    window.location.href = "anomalie.html";
}

// ☢️ symulacja "wykrycia anomalii"
function anomalyPing() {
    const auth = getAuth();
    const anomalyDetected = true;

    if (anomalyDetected && !auth) {
        window.location.href = "login.html?redirect=anomalie.html";
    }
}

// trochę dramatyzmu
setTimeout(anomalyPing, 2500);
</script>

</body>
</html>
